<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hindi Learning Platform | Polished Rebuild</title>
  <meta name="description" content="Polished single-file Hindi learning app with search, lessons, quizzes, flashcards, writing practice, exports, and profile tracking." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Tiro+Devanagari+Hindi:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --bg-elevated: #ffffff;
      --bg-soft: #eef2f8;
      --line: #dae2ee;
      --text: #182234;
      --text-dim: #5d6880;
      --text-faint: #8a94ab;
      --primary: #ff6a3d;
      --primary-strong: #ef5426;
      --primary-soft: rgba(255, 106, 61, 0.12);
      --secondary: #4459d4;
      --secondary-soft: rgba(68, 89, 212, 0.12);
      --success: #15a16d;
      --warning: #f3b323;
      --danger: #df4560;
      --success-soft: rgba(21, 161, 109, 0.13);
      --warning-soft: rgba(243, 179, 35, 0.13);
      --danger-soft: rgba(223, 69, 96, 0.12);
      --shadow-xs: 0 1px 2px rgba(15, 23, 42, 0.05);
      --shadow-sm: 0 10px 24px rgba(15, 23, 42, 0.07);
      --shadow-md: 0 18px 44px rgba(15, 23, 42, 0.09);
      --shadow-lg: 0 28px 80px rgba(15, 23, 42, 0.14);
      --radius-sm: 12px;
      --radius-md: 18px;
      --radius-lg: 24px;
      --radius-xl: 32px;
      --container: 1480px;
      --font-ui: "Inter", system-ui, sans-serif;
      --font-hindi: "Tiro Devanagari Hindi", serif;
      --transition: 200ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #0f1320;
      --bg-elevated: #141a2b;
      --bg-soft: #1a2238;
      --line: #27324a;
      --text: #eef2ff;
      --text-dim: #c6d2e7;
      --text-faint: #97a6c2;
      --primary: #ff8c62;
      --primary-strong: #ff7547;
      --primary-soft: rgba(255, 140, 98, 0.14);
      --secondary: #95a9ff;
      --secondary-soft: rgba(149, 169, 255, 0.12);
      --success: #2bc487;
      --warning: #ffc84e;
      --danger: #ff7a8f;
      --success-soft: rgba(43, 196, 135, 0.12);
      --warning-soft: rgba(255, 200, 78, 0.12);
      --danger-soft: rgba(255, 122, 143, 0.12);
      --shadow-xs: 0 2px 4px rgba(0, 0, 0, 0.2);
      --shadow-sm: 0 10px 24px rgba(0, 0, 0, 0.24);
      --shadow-md: 0 18px 44px rgba(0, 0, 0, 0.28);
      --shadow-lg: 0 28px 80px rgba(0, 0, 0, 0.34);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-ui);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 106, 61, 0.08), transparent 28%),
        radial-gradient(circle at top right, rgba(68, 89, 212, 0.08), transparent 26%),
        var(--bg);
      line-height: 1.55;
    }
    img, canvas, svg { display: block; max-width: 100%; }
    button, input, textarea, select { font: inherit; color: inherit; }
    button { cursor: pointer; border: none; background: none; }
    a { color: inherit; text-decoration: none; }
    h1, h2, h3, h4, p { margin: 0; }
    ul { margin: 0; padding: 0; list-style: none; }
    [hidden] { display: none !important; }
    .sr-only { position: absolute; width: 1px; height: 1px; clip: rect(0,0,0,0); overflow: hidden; white-space: nowrap; }
    :focus-visible { outline: 3px solid rgba(68, 89, 212, 0.45); outline-offset: 2px; }

    .app-shell { width: min(100%, var(--container)); margin: 0 auto; padding: 22px; }
    .topbar {
      position: sticky;
      top: 10px;
      z-index: 50;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 16px 18px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.68);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow-md);
      margin-bottom: 22px;
    }
    [data-theme="dark"] .topbar {
      background: rgba(20, 26, 43, 0.72);
      border-color: rgba(255,255,255,0.06);
    }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .brand-mark {
      width: 50px; height: 50px; border-radius: 18px;
      display: grid; place-items: center;
      font-family: var(--font-hindi); font-size: 1.7rem; color: white;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      box-shadow: var(--shadow-sm);
    }
    .brand-title { font-size: 1.06rem; font-weight: 800; letter-spacing: -0.03em; }
    .brand-subtitle { font-size: 0.84rem; color: var(--text-dim); }
    .topbar-center { display: grid; gap: 12px; min-width: 0; }
    .search-wrap { position: relative; }
    .search-wrap input { padding-left: 42px; min-height: 46px; }
    .search-icon { position: absolute; inset: 50% auto auto 14px; transform: translateY(-50%); color: var(--text-faint); pointer-events: none; }
    .route-tabs { display: flex; flex-wrap: wrap; gap: 10px; }
    .route-tab {
      min-height: 40px; padding: 0 14px; border-radius: 999px;
      border: 1px solid var(--line); background: transparent; color: var(--text-dim);
      font-weight: 700; transition: all var(--transition);
    }
    .route-tab:hover { background: var(--bg-soft); transform: translateY(-1px); }
    .route-tab.active { background: var(--text); color: var(--bg-elevated); border-color: transparent; }
    .topbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }

    .layout { display: grid; grid-template-columns: 320px minmax(0, 1fr); gap: 22px; align-items: start; }
    .sidebar { position: sticky; top: 116px; display: grid; gap: 18px; }
    .view { display: grid; gap: 22px; min-width: 0; }

    .card {
      background: var(--bg-elevated);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .card.pad { padding: 20px; }
    .hero {
      position: relative;
      overflow: hidden;
      border-radius: 32px;
      border: 1px solid var(--line);
      padding: clamp(22px, 4vw, 34px);
      box-shadow: var(--shadow-md);
      background:
        radial-gradient(circle at 0% 0%, rgba(255, 106, 61, 0.15), transparent 32%),
        radial-gradient(circle at 100% 0%, rgba(68, 89, 212, 0.14), transparent 28%),
        linear-gradient(135deg, rgba(255,255,255,0.78), rgba(255,255,255,0.68));
    }
    [data-theme="dark"] .hero {
      background:
        radial-gradient(circle at 0% 0%, rgba(255, 140, 98, 0.16), transparent 32%),
        radial-gradient(circle at 100% 0%, rgba(149, 169, 255, 0.14), transparent 28%),
        linear-gradient(135deg, rgba(20,26,43,0.82), rgba(20,26,43,0.68));
    }
    .hero-grid { display: grid; grid-template-columns: minmax(0, 1.5fr) minmax(260px, 0.9fr); gap: 18px; align-items: stretch; }
    .hero-title { font-size: clamp(1.9rem, 4vw, 3.2rem); font-weight: 900; line-height: 1.03; letter-spacing: -0.05em; max-width: 14ch; margin-bottom: 12px; }
    .hero-copy { color: var(--text-dim); max-width: 66ch; margin-bottom: 18px; }
    .hero-actions, .row.wrap { display: flex; flex-wrap: wrap; gap: 12px; }
    .hero-panel {
      border-radius: 24px; padding: 18px;
      border: 1px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.56);
      box-shadow: var(--shadow-sm);
      display: grid; gap: 14px;
    }
    [data-theme="dark"] .hero-panel { background: rgba(20,26,43,0.62); border-color: rgba(255,255,255,0.06); }

    .eyebrow { display: inline-flex; align-items: center; gap: 8px; color: var(--primary-strong); font-size: 0.76rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; }
    .section-title { font-size: clamp(1.35rem, 2.5vw, 2rem); font-weight: 850; letter-spacing: -0.03em; }
    .card-title { font-size: 1.06rem; font-weight: 800; letter-spacing: -0.02em; }
    .muted { color: var(--text-dim); }
    .faint { color: var(--text-faint); }
    .hindi { font-family: var(--font-hindi); line-height: 1.6; }
    .translit { color: var(--text-faint); font-style: italic; font-size: 0.92rem; }
    .row { display: flex; align-items: center; gap: 12px; }
    .row.space { justify-content: space-between; }
    .stack-sm, .stack-md, .stack-lg { display: grid; }
    .stack-sm { gap: 10px; } .stack-md { gap: 16px; } .stack-lg { gap: 22px; }

    .pill, .badge {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      min-height: 34px; padding: 0 12px; border-radius: 999px; font-weight: 700;
    }
    .pill { background: var(--bg-soft); border: 1px solid var(--line); color: var(--text-dim); font-size: 0.88rem; }
    .badge { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.03em; }
    .badge.beginner { background: rgba(59,130,246,0.12); color: #0c72a7; border: 1px solid rgba(59,130,246,0.18); }
    .badge.intermediate { background: rgba(139,92,246,0.12); color: #6f4ad7; border: 1px solid rgba(139,92,246,0.18); }
    .badge.advanced { background: rgba(21,161,109,0.12); color: #13845b; border: 1px solid rgba(21,161,109,0.18); }
    .badge.poet { background: rgba(236,72,153,0.12); color: #c43679; border: 1px solid rgba(236,72,153,0.18); }

    .btn, .chip, .input, .textarea, .select {
      border-radius: 14px; transition: all var(--transition);
    }
    .btn {
      min-height: 44px; padding: 0 16px; display: inline-flex; align-items: center; justify-content: center; gap: 10px; font-weight: 750;
      border: 1px solid transparent;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn.primary { background: linear-gradient(135deg, var(--primary), var(--primary-strong)); color: white; box-shadow: var(--shadow-sm); }
    .btn.secondary { background: var(--secondary); color: white; }
    .btn.soft { background: var(--bg-soft); border-color: var(--line); color: var(--text); }
    .btn.ghost { background: transparent; border-color: var(--line); color: var(--text-dim); }
    .btn.danger { background: transparent; border-color: rgba(223,69,96,0.22); color: var(--danger); }
    .btn.icon { width: 44px; padding: 0; }
    .btn.block { width: 100%; }

    .chip {
      min-height: 38px; padding: 0 14px; display: inline-flex; align-items: center; gap: 10px;
      border: 1px solid var(--line); background: var(--bg-elevated); color: var(--text-dim); font-weight: 700;
    }
    .chip:hover { transform: translateY(-1px); }
    .chip.active { background: var(--primary-soft); color: var(--primary-strong); border-color: rgba(255,106,61,0.2); }

    .input, .textarea, .select {
      width: 100%; border: 1px solid var(--line); background: var(--bg-elevated); color: var(--text);
      padding: 12px 14px; box-shadow: var(--shadow-xs);
    }
    .input::placeholder, .textarea::placeholder { color: var(--text-faint); }
    .input:focus, .textarea:focus, .select:focus { outline: none; border-color: rgba(68,89,212,0.5); box-shadow: 0 0 0 4px rgba(68,89,212,0.12); }
    .textarea { min-height: 120px; resize: vertical; }
    .field { display: grid; gap: 8px; }
    .field label { font-size: 0.88rem; font-weight: 700; color: var(--text-dim); }

    .progress-shell { width: 100%; height: 10px; border-radius: 999px; overflow: hidden; background: var(--bg-soft); border: 1px solid var(--line); }
    .progress-bar { height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--primary), var(--secondary)); transition: width 400ms ease; }

    .stats-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 16px; }
    .stat { padding: 18px; border-radius: 22px; border: 1px solid var(--line); background: var(--bg-elevated); box-shadow: var(--shadow-sm); display: grid; gap: 8px; }
    .stat-value { font-size: clamp(1.6rem, 3vw, 2.35rem); font-weight: 900; letter-spacing: -0.05em; }
    .stat-label { color: var(--text-dim); font-weight: 700; font-size: 0.9rem; }

    .panel-grid { display: grid; grid-template-columns: 1.15fr 0.85fr; gap: 18px; }
    .mini-chart { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 12px; align-items: end; height: 220px; margin-top: 12px; }
    .mini-bar-wrap { display: grid; gap: 8px; justify-items: center; }
    .mini-bar { width: 100%; max-width: 42px; border-radius: 18px 18px 10px 10px; background: linear-gradient(180deg, var(--secondary), var(--primary)); min-height: 24px; box-shadow: var(--shadow-sm); }
    .mini-axis { color: var(--text-faint); font-size: 0.8rem; font-weight: 700; }

    .toolbar { display: grid; gap: 14px; padding: 18px; border-radius: 24px; border: 1px solid var(--line); background: var(--bg-elevated); box-shadow: var(--shadow-sm); }
    .toolbar-grid { display: grid; grid-template-columns: minmax(0, 1.4fr) auto auto; gap: 12px; align-items: end; }

    .lessons-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
    .lesson-card {
      position: relative; display: grid; gap: 16px; padding: 20px;
      border-radius: 26px; border: 1px solid var(--line); background: var(--bg-elevated); box-shadow: var(--shadow-sm);
      transition: all var(--transition);
    }
    .lesson-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: rgba(255,106,61,0.18); }
    .lesson-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .lesson-icon {
      width: 52px; height: 52px; border-radius: 18px; display: grid; place-items: center;
      background: var(--bg-soft); border: 1px solid var(--line); color: var(--text); font-family: var(--font-hindi); font-size: 1.6rem;
    }
    .lesson-title { font-size: 1.12rem; font-weight: 800; letter-spacing: -0.03em; }
    .lesson-subtitle { color: var(--text-dim); font-size: 0.95rem; }
    .lesson-meta { display: flex; flex-wrap: wrap; gap: 10px; }
    .lesson-foot { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; padding-top: 8px; border-top: 1px dashed var(--line); }
    .lesson-completed {
      position: absolute; inset: 16px 16px auto auto; width: 34px; height: 34px; border-radius: 50%;
      display: grid; place-items: center; background: var(--success); color: white; font-weight: 900; box-shadow: var(--shadow-sm);
    }
    .bookmark {
      width: 42px; height: 42px; border-radius: 14px; border: 1px solid var(--line); background: var(--bg-elevated); color: var(--text-faint);
      display: grid; place-items: center; transition: all var(--transition);
    }
    .bookmark.active { background: var(--warning-soft); color: #c18100; border-color: rgba(243,179,35,0.22); }

    .detail-shell, .practice-layout { display: grid; gap: 18px; }
    .detail-hero { display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 18px; align-items: start; }
    .detail-article { display: grid; gap: 18px; }
    .sticky-summary { position: sticky; top: 116px; display: grid; gap: 16px; }
    .article-block { padding: 22px; border-radius: 24px; border: 1px solid var(--line); background: var(--bg-elevated); box-shadow: var(--shadow-sm); }
    .block-title { font-size: 1.06rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 12px; }
    .bullet-list { display: grid; gap: 10px; margin-top: 12px; }
    .bullet-item { display: grid; grid-template-columns: auto 1fr; gap: 10px; align-items: start; color: var(--text-dim); }
    .bullet-dot { width: 10px; height: 10px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); margin-top: 0.55rem; }
    .vocab-grid, .example-grid, .phrase-grid, .culture-grid, .achievement-grid, .prompt-grid, .mission-grid, .grammar-grid, .gallery-grid { display: grid; gap: 16px; }
    .vocab-grid, .achievement-grid, .gallery-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .culture-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .tile {
      padding: 16px; border-radius: 18px; border: 1px solid var(--line); background: var(--bg-elevated); box-shadow: var(--shadow-xs);
      display: grid; gap: 8px;
    }
    .tile-accent { background: linear-gradient(180deg, rgba(255,106,61,0.04), rgba(68,89,212,0.04)), var(--bg-elevated); }
    .tile .hindi { font-size: 1.42rem; }
    .note { padding: 16px 18px; border-left: 4px solid var(--primary); background: var(--primary-soft); border-radius: 18px; color: var(--text-dim); }

    .practice-tabs { display: flex; flex-wrap: wrap; gap: 10px; }
    .quiz-shell { display: grid; gap: 18px; }
    .quiz-question { padding: 24px; border-radius: 24px; border: 1px solid var(--line); background: var(--bg-elevated); box-shadow: var(--shadow-sm); display: grid; gap: 16px; }
    .quiz-options { display: grid; gap: 12px; }
    .quiz-option {
      width: 100%; text-align: left; display: grid; grid-template-columns: auto 1fr; gap: 12px; align-items: start;
      padding: 14px 16px; border-radius: 18px; border: 1px solid var(--line); background: var(--bg-elevated); transition: all var(--transition);
    }
    .quiz-option:hover { transform: translateY(-1px); background: var(--bg-soft); }
    .quiz-option.correct { background: var(--success-soft); border-color: rgba(21,161,109,0.22); }
    .quiz-option.incorrect { background: var(--danger-soft); border-color: rgba(223,69,96,0.2); }
    .quiz-option.disabled { pointer-events: none; opacity: 0.86; }
    .option-mark {
      width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center;
      background: var(--bg-soft); border: 1px solid var(--line); font-size: 0.88rem; font-weight: 800;
    }
    .feedback-box { padding: 16px 18px; border-radius: 18px; border: 1px solid var(--line); background: var(--bg-soft); color: var(--text-dim); }

    .flashcard-stage { display: grid; gap: 18px; justify-items: center; }
    .flashcard { width: min(100%, 560px); min-height: 340px; perspective: 1200px; }
    .flashcard-inner { position: relative; width: 100%; min-height: 340px; transform-style: preserve-3d; transition: transform 520ms cubic-bezier(0.2,0.8,0.2,1); }
    .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
    .flash-face {
      position: absolute; inset: 0; backface-visibility: hidden; border-radius: 30px;
      border: 1px solid var(--line); box-shadow: var(--shadow-md); padding: 28px;
      display: grid; align-content: center; justify-items: center; gap: 14px; text-align: center;
    }
    .flash-front { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
    .flash-back { transform: rotateY(180deg); background: var(--bg-elevated); color: var(--text); }
    .flash-word { font-family: var(--font-hindi); font-size: clamp(2.2rem, 6vw, 4.2rem); line-height: 1.2; }
    .flash-english { font-size: 1.2rem; font-weight: 850; }

    .canvas-wrap {
      border-radius: 26px; border: 2px dashed var(--line);
      background:
        linear-gradient(180deg, transparent 31px, rgba(68,89,212,0.07) 32px),
        linear-gradient(90deg, transparent 31px, rgba(255,106,61,0.06) 32px),
        var(--bg-elevated);
      background-size: 32px 32px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .writing-canvas { width: 100%; min-height: 420px; background: transparent; cursor: crosshair; touch-action: none; }
    .range-shell { display: flex; align-items: center; gap: 10px; }
    .range-shell input[type="range"] { width: 180px; accent-color: var(--secondary); }

    .culture-card, .achievement, .gallery-card {
      border: 1px solid var(--line); background: var(--bg-elevated); box-shadow: var(--shadow-sm);
    }
    .culture-card { border-radius: 24px; padding: 20px; display: grid; gap: 12px; }
    .culture-emoji, .achievement-icon {
      width: 52px; height: 52px; border-radius: 18px; display: grid; place-items: center; background: var(--bg-soft); border: 1px solid var(--line);
    }
    .achievement { border-radius: 22px; padding: 18px; display: grid; gap: 10px; opacity: 0.66; }
    .achievement.unlocked { opacity: 1; background: linear-gradient(180deg, rgba(243,179,35,0.08), transparent 85%), var(--bg-elevated); border-color: rgba(243,179,35,0.2); }
    .achievement-top { display: flex; gap: 12px; align-items: center; }
    .settings-grid { display: grid; gap: 14px; }
    .setting-row { display: flex; align-items: center; justify-content: space-between; gap: 18px; padding: 16px 0; border-bottom: 1px solid var(--line); }
    .setting-row:last-child { border-bottom: none; padding-bottom: 0; }
    .toggle {
      position: relative; width: 56px; height: 32px; border-radius: 999px; background: var(--line); transition: background var(--transition);
    }
    .toggle::after {
      content: ""; position: absolute; top: 3px; left: 3px; width: 26px; height: 26px; border-radius: 50%;
      background: white; box-shadow: var(--shadow-sm); transition: transform var(--transition);
    }
    .toggle.active { background: var(--success); }
    .toggle.active::after { transform: translateX(24px); }

    .gallery-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .gallery-card { border-radius: 20px; overflow: hidden; }
    .gallery-card img { width: 100%; aspect-ratio: 1.08; object-fit: cover; background: var(--bg-soft); }
    .gallery-caption { padding: 12px; display: grid; gap: 4px; color: var(--text-dim); font-size: 0.88rem; }

    .modal {
      position: fixed; inset: 0; z-index: 80; display: none; place-items: center; padding: 24px;
      background: rgba(15, 19, 32, 0.56); backdrop-filter: blur(8px);
    }
    .modal.open { display: grid; }
    .modal-card {
      width: min(100%, 680px); max-height: min(88vh, 900px); overflow: auto;

    const Utils = {
      clamp(value, min, max) { return Math.min(max, Math.max(min, value)); },
      percent(part, total) { return total ? Utils.clamp(Math.round((part / total) * 100), 0, 100) : 0; },
      round(value, places = 0) { const factor = 10 ** places; return Math.round(value * factor) / factor; },
      uid(prefix = "id") { return `${prefix}-${Math.random().toString(36).slice(2, 10)}`; },
      safeParse(json, fallback) { try { return JSON.parse(json); } catch { return fallback; } },
      deepClone(value) { return JSON.parse(JSON.stringify(value)); },
      shuffle(array) { const clone = [...array]; for (let i = clone.length - 1; i > 0; i -= 1) { const j = Math.floor(Math.random() * (i + 1)); [clone[i], clone[j]] = [clone[j], clone[i]]; } return clone; },
      todayKey() { return new Date().toISOString().slice(0, 10); },
      yesterdayKey() { const d = new Date(); d.setDate(d.getDate() - 1); return d.toISOString().slice(0, 10); },
      escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      },
      prettyDate(dateInput) {
        try {
          return new Intl.DateTimeFormat(undefined, { year: "numeric", month: "short", day: "numeric" }).format(new Date(dateInput));
        } catch {
          return "Unknown date";
        }
      },
      download(filename, text, mime = "application/json;charset=utf-8") {
        const blob = new Blob([text], { type: mime });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.append(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }
    };

    class StorageManager {
      constructor(storageKey) { this.storageKey = storageKey; }
      load() { const raw = localStorage.getItem(this.storageKey); return raw ? Utils.safeParse(raw, null) : null; }
      save(payload) { localStorage.setItem(this.storageKey, JSON.stringify(payload)); }
      clear() { localStorage.removeItem(this.storageKey); }
    }

    class ToastManager {
      constructor(root) { this.root = root; }
      show(message, type = "info", title = "Notice") {
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;
        toast.innerHTML = `<strong>${Utils.escapeHtml(title)}</strong><div>${Utils.escapeHtml(message)}</div>`;
        this.root.append(toast);
        setTimeout(() => {
          toast.style.opacity = "0";
          toast.style.transform = "translateY(8px)";
          toast.style.transition = "opacity 180ms ease, transform 180ms ease";
          setTimeout(() => toast.remove(), 180);
        }, 2600);
      }
    }

    class SpeechService {
      constructor(toast) { this.toast = toast; }
      speak(text) {
        if (!("speechSynthesis" in window)) {
          this.toast.show("Speech synthesis is not available in this browser.", "warning", "Audio unavailable");
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "hi-IN";
        utterance.rate = 0.92;
        utterance.pitch = 1.0;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
      }
      stop() { if ("speechSynthesis" in window) window.speechSynthesis.cancel(); }
    }

    class DrawingBoard {
      constructor(toast) {
        this.toast = toast;
        this.canvas = null;
        this.context = null;
        this.color = "#1f2152";
        this.brushSize = 6;
        this.drawing = false;
        this.last = null;
        this.pointerId = null;
      }
      mount(canvas) {
        if (!canvas) return;
        this.canvas = canvas;
        this.context = canvas.getContext("2d");
        this.resize();
        this.bind();
        this.clear(false);
      }
      resize() {
        if (!this.canvas || !this.context) return;
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        const rect = this.canvas.getBoundingClientRect();
        this.canvas.width = Math.round(rect.width * ratio);
        this.canvas.height = Math.round(rect.height * ratio);
        this.context.setTransform(ratio, 0, 0, ratio, 0, 0);
        this.context.lineJoin = "round";
        this.context.lineCap = "round";
        this.context.strokeStyle = this.color;
        this.context.lineWidth = this.brushSize;
      }
      bind() {
        this.canvas.onpointerdown = (e) => this.start(e);
        this.canvas.onpointermove = (e) => this.draw(e);
        this.canvas.onpointerup = () => this.stop();
        this.canvas.onpointerleave = () => this.stop();
        this.canvas.onpointercancel = () => this.stop();
      }
      coords(event) {
        const rect = this.canvas.getBoundingClientRect();
        return { x: event.clientX - rect.left, y: event.clientY - rect.top };
      }
      start(event) { this.drawing = true; this.pointerId = event.pointerId; this.last = this.coords(event); }
      draw(event) {
        if (!this.drawing || event.pointerId !== this.pointerId || !this.context) return;
        const point = this.coords(event);
        this.context.strokeStyle = this.color;
        this.context.lineWidth = this.brushSize;
        this.context.beginPath();
        this.context.moveTo(this.last.x, this.last.y);
        this.context.lineTo(point.x, point.y);
        this.context.stroke();
        this.last = point;
      }
      stop() { this.drawing = false; this.last = null; this.pointerId = null; }
      setColor(color) { this.color = color; }
      setBrushSize(size) { this.brushSize = size; }
      clear(notify = true) {
        if (!this.context || !this.canvas) return;
        const rect = this.canvas.getBoundingClientRect();
        this.context.clearRect(0, 0, rect.width, rect.height);
        if (notify) this.toast.show("Writing board cleared.", "info", "Canvas");
      }
      exportImage() { return this.canvas ? this.canvas.toDataURL("image/png") : null; }
    }

    class HindiStore {
      constructor(storage) {
        this.storage = storage;
        this.state = this.initialState();
        this.load();
        this.refreshStreak();
      }
      initialState() {
        return {
          meta: { version: APP_DATA.meta.version, lastOpenedOn: Utils.todayKey() },
          ui: { route: "dashboard", lessonId: null, practiceTab: "quiz", lessonFilter: "all", lessonSort: "order", search: "", theme: "light" },
          preferences: { transliteration: true, audioEnabled: true, dailyGoal: 20, boardColor: "#1f2152", boardBrush: 6 },
          progress: {
            xp: 0,
            completedLessonIds: [],
            bookmarkedLessonIds: [],
            quizHistory: [],
            writingGallery: [],
            lessonNotes: {},
            streak: 1,
            lastStudyDate: Utils.todayKey(),
            highScoreCount: 0,
            writingSaves: 0,
            exports: 0,
            openedTravelLesson: false,
            wroteDoha: false
          }
        };
      }
      load() {
        const saved = this.storage.load();
        if (!saved) return;
        this.state = {
          ...this.initialState(),
          ...saved,
          ui: { ...this.initialState().ui, ...(saved.ui || {}) },
          preferences: { ...this.initialState().preferences, ...(saved.preferences || {}) },
          progress: { ...this.initialState().progress, ...(saved.progress || {}) },
          meta: { ...this.initialState().meta, ...(saved.meta || {}) }
        };
      }
      save() { this.state.meta.lastOpenedOn = Utils.todayKey(); this.storage.save(this.state); }
      reset() { this.state = this.initialState(); this.save(); }
      refreshStreak() {
        const today = Utils.todayKey();
        const yesterday = Utils.yesterdayKey();
        const last = this.state.progress.lastStudyDate;
        if (last === today) return;
        this.state.progress.streak = last === yesterday ? this.state.progress.streak + 1 : 1;
        this.state.progress.lastStudyDate = today;
        this.save();
      }
      setRoute(route, payload = {}) { this.state.ui.route = route; if (payload.lessonId !== undefined) this.state.ui.lessonId = payload.lessonId; this.save(); }
      setSearch(value) { this.state.ui.search = value.trim(); this.save(); }
      setTheme(theme) { this.state.ui.theme = theme; this.save(); }
      toggleTheme() { this.state.ui.theme = this.state.ui.theme === "light" ? "dark" : "light"; this.save(); }
      setLessonFilter(filter) { this.state.ui.lessonFilter = filter; this.save(); }
      setLessonSort(sort) { this.state.ui.lessonSort = sort; this.save(); }
      setPracticeTab(tab) { this.state.ui.practiceTab = tab; this.save(); }
      updatePreference(key, value) { this.state.preferences[key] = value; this.save(); }
      addXP(amount) { this.state.progress.xp += amount; this.save(); }
      completeLesson(lessonId) {
        if (this.state.progress.completedLessonIds.includes(lessonId)) return false;
        this.state.progress.completedLessonIds.push(lessonId);
        const lesson = APP_DATA.lessons.find((item) => item.id === lessonId);
        if (lesson) {
          this.addXP(lesson.xp);
          if (lesson.topicId === "travel") this.state.progress.openedTravelLesson = true;
          if (lesson.topicId === "write-doha") this.state.progress.wroteDoha = true;
        }
        this.save();
        return true;
      }
      toggleBookmark(lessonId) {
        const set = this.state.progress.bookmarkedLessonIds;
        const index = set.indexOf(lessonId);
        if (index >= 0) set.splice(index, 1);
        else set.push(lessonId);
        this.save();
      }
      saveNote(lessonId, note) { this.state.progress.lessonNotes[lessonId] = note; this.save(); }
      recordQuiz(result) {
        this.state.progress.quizHistory.push({ id: Utils.uid("quiz"), createdAt: new Date().toISOString(), ...result });
        if (result.scorePercent >= 90) this.state.progress.highScoreCount += 1;
        this.addXP(Math.max(15, result.score * 10));
        this.save();
      }
      recordWriting(imageData, caption) {
        this.state.progress.writingGallery.unshift({ id: Utils.uid("writing"), createdAt: new Date().toISOString(), imageData, caption });
        this.state.progress.writingGallery = this.state.progress.writingGallery.slice(0, 18);
        this.state.progress.writingSaves += 1;
        this.addXP(20);
        this.save();
      }
      recordExport() { this.state.progress.exports += 1; this.save(); }
      getLevel() {
        const xp = this.state.progress.xp;
        if (xp < 600) return { number: 1, label: "Beginner" };
        if (xp < 1600) return { number: 2, label: "Intermediate" };
        if (xp < 3200) return { number: 3, label: "Advanced" };
        return { number: 4, label: "Poet" };
      }
      getNextLevelXP() {
        const xp = this.state.progress.xp;
        if (xp < 600) return 600;
        if (xp < 1600) return 1600;
        if (xp < 3200) return 3200;
        return 5200;
      }
      getCompletionPercent() { return Utils.percent(this.state.progress.completedLessonIds.length, APP_DATA.lessons.length); }
      getAchievements() {
        const lessons = this.state.progress.completedLessonIds.length;
        const foundation = APP_DATA.lessons.filter((lesson) => lesson.track === "foundation" && this.state.progress.completedLessonIds.includes(lesson.id)).length;
        const core = APP_DATA.lessons.filter((lesson) => lesson.track === "core" && this.state.progress.completedLessonIds.includes(lesson.id)).length;
        const poetry = APP_DATA.lessons.filter((lesson) => lesson.track === "poetry" && this.state.progress.completedLessonIds.includes(lesson.id)).length;
        const values = {
          lessons,
          foundation,
          streak: this.state.progress.streak,
          writingSaves: this.state.progress.writingSaves,
          highScores: this.state.progress.highScoreCount,
          core,
          travel: this.state.progress.openedTravelLesson ? 1 : 0,
          poetry,
          doha: this.state.progress.wroteDoha ? 1 : 0,
          exports: this.state.progress.exports
        };
        return APP_DATA.achievements.map((item) => ({ ...item, unlocked: (values[item.type] || 0) >= item.threshold, current: values[item.type] || 0 }));
      }
      exportSnapshot() { return { exportedAt: new Date().toISOString(), appVersion: APP_DATA.meta.version, state: this.state }; }
      importSnapshot(snapshot) {
        if (!snapshot || typeof snapshot !== "object" || !snapshot.state) throw new Error("Invalid snapshot format.");
        this.state = {
          ...this.initialState(),
          ...snapshot.state,
          ui: { ...this.initialState().ui, ...(snapshot.state.ui || {}) },
          preferences: { ...this.initialState().preferences, ...(snapshot.state.preferences || {}) },
          progress: { ...this.initialState().progress, ...(snapshot.state.progress || {}) },
          meta: { ...this.initialState().meta, ...(snapshot.state.meta || {}) }
        };
        this.save();
      }
    }

    class HindiLearningApp {
      constructor() {
        this.storage = new StorageManager(APP_DATA.meta.storageKey);
        this.toast = new ToastManager(document.getElementById("toastStack"));
        this.speech = new SpeechService(this.toast);
        this.store = new HindiStore(this.storage);
        this.board = new DrawingBoard(this.toast);
        this.modal = { root: document.getElementById("modal"), title: document.getElementById("modalTitle"), body: document.getElementById("modalBody") };
        this.elements = {
          appShell: document.getElementById("appShell"),
          sidebar: document.getElementById("sidebar"),
          view: document.getElementById("view"),
          globalSearch: document.getElementById("globalSearch"),
          xpPill: document.getElementById("xpPill")
        };
        this.runtime = {
          activeQuiz: null,
          flashcardPool: [],
          flashcardIndex: 0,
          flashcardFlipped: false,
          flashcardFilter: "all"
        };
        this.init();
      }

      init() {
        this.applyTheme();
        this.seedFlashcards();
        this.bindEvents();
        this.render();
      }

      bindEvents() {
        document.addEventListener("click", (event) => this.handleClick(event));
        document.addEventListener("input", (event) => this.handleInput(event));
        document.addEventListener("change", (event) => this.handleChange(event));
        document.addEventListener("keydown", (event) => this.handleKeydown(event));
        window.addEventListener("resize", () => this.handleResize());
        this.elements.globalSearch.value = this.store.state.ui.search;
      }

      handleResize() {
        if (this.store.state.ui.route === "practice" && this.store.state.ui.practiceTab === "writing") this.board.resize();
      }

      handleKeydown(event) {
        const tag = document.activeElement?.tagName?.toLowerCase();
        const isField = ["input", "textarea", "select"].includes(tag);
        if (isField) return;
        if (event.key === "/") { event.preventDefault(); this.elements.globalSearch.focus(); return; }
        if (event.key.toLowerCase() === "g") { this.navigate("dashboard"); return; }
        if (event.key.toLowerCase() === "l") { this.navigate("learn"); return; }
        if (event.key.toLowerCase() === "p") { this.navigate("practice"); return; }
        if (event.key === "Escape") { this.closeModal(); this.speech.stop(); }
      }

      handleInput(event) {
        const target = event.target;
        if (target.id === "globalSearch") {
          this.store.setSearch(target.value);
          if (this.store.state.ui.route === "learn" || this.store.state.ui.route === "dashboard") this.render();
          return;
        }
        if (target.matches("[data-note-for]")) {
          this.store.saveNote(target.dataset.noteFor, target.value);
          return;
        }
        if (target.matches("[data-pref-range]")) {
          const key = target.dataset.prefRange;
          this.store.updatePreference(key, Number(target.value));
          if (key === "boardBrush") this.board.setBrushSize(Number(target.value));
          this.syncSidebar();
          return;
        }
      }

      handleChange(event) {
        const target = event.target;
        if (target.matches("[data-lesson-filter]")) { this.store.setLessonFilter(target.value); this.render(); return; }
        if (target.matches("[data-lesson-sort]")) { this.store.setLessonSort(target.value); this.render(); return; }
        if (target.matches("[data-pref-toggle]")) { this.store.updatePreference(target.dataset.prefToggle, Boolean(target.checked)); this.syncSidebar(); this.render(); return; }
        if (target.matches("[data-pref-color]")) { this.store.updatePreference("boardColor", target.value); this.board.setColor(target.value); this.syncSidebar(); return; }
        if (target.matches("[data-import-file]")) {
          const file = target.files?.[0];
          if (!file) return;
          file.text().then((text) => {
            const parsed = Utils.safeParse(text, null);
            if (!parsed) { this.toast.show("Could not read that file. Please import a valid export JSON.", "danger", "Import failed"); return; }
            try {
              this.store.importSnapshot(parsed);
              this.applyTheme();
              this.seedFlashcards();
              this.toast.show("Progress imported successfully.", "success", "Import complete");
              this.render();
            } catch (error) {
              this.toast.show(error.message || "Import failed.", "danger", "Import failed");
            }
          });
        }
      }

      handleClick(event) {
        const element = event.target.closest("[data-route], [data-action], [data-open-lesson], [data-tab], [data-answer-index], [data-flash-filter]");
        if (!element) return;

        if (element.dataset.route) { this.navigate(element.dataset.route); return; }
        if (element.dataset.openLesson) { this.openLesson(element.dataset.openLesson); return; }
        if (element.dataset.tab) { this.store.setPracticeTab(element.dataset.tab); this.render(); return; }
        if (element.dataset.answerIndex !== undefined) { this.answerQuiz(Number(element.dataset.answerIndex)); return; }
        if (element.dataset.flashFilter) { this.seedFlashcards(element.dataset.flashFilter); this.store.setPracticeTab("flashcards"); this.navigate("practice"); return; }

        const action = element.dataset.action;
        if (action === "toggle-theme") { this.store.toggleTheme(); this.applyTheme(); this.render(); return; }
        if (action === "open-help") { this.openHelp(); return; }
        if (action === "close-modal") { this.closeModal(); return; }
        if (action === "continue-learning") { const next = this.getNextLesson(); if (next) this.openLesson(next.id); return; }
        if (action === "start-random-quiz") { this.startRandomQuiz(); return; }
        if (action === "start-lesson-quiz") { this.startLessonQuiz(element.dataset.lessonId); return; }
        if (action === "next-question") { this.nextQuizQuestion(); return; }
        if (action === "finish-quiz") { this.finishQuiz(); return; }
        if (action === "complete-lesson") { this.completeLesson(element.dataset.lessonId); return; }
        if (action === "bookmark-lesson") { this.store.toggleBookmark(element.dataset.lessonId); this.render(); return; }
        if (action === "speak-text") {
          if (!this.store.state.preferences.audioEnabled) { this.toast.show("Audio is currently turned off in your settings.", "warning", "Audio disabled"); return; }
          this.speech.speak(element.dataset.text || ""); return;
        }
        if (action === "flip-flashcard") { this.runtime.flashcardFlipped = !this.runtime.flashcardFlipped; this.render(); return; }
        if (action === "flash-next") { this.moveFlashcard(1); return; }
        if (action === "flash-prev") { this.moveFlashcard(-1); return; }
        if (action === "shuffle-flashcards") { this.seedFlashcards(this.runtime.flashcardFilter); this.toast.show("Flashcards shuffled.", "success", "Deck refreshed"); this.render(); return; }
        if (action === "clear-canvas") { this.board.clear(); return; }
        if (action === "save-canvas") {
          const dataUrl = this.board.exportImage();
          const caption = document.querySelector("[data-writing-caption]")?.value?.trim() || "Writing practice";
          if (!dataUrl) { this.toast.show("Nothing to save yet.", "warning", "Canvas"); return; }
          this.store.recordWriting(dataUrl, caption);
          this.toast.show("Sketch saved to your gallery.", "success", "Writing saved");
          this.render();
          return;
        }
        if (action === "use-prompt") {
          const title = element.dataset.promptTitle || "Writing prompt";
          const text = element.dataset.promptText || "";
          this.store.setPracticeTab("writing");
          this.navigate("practice");
          setTimeout(() => {
            const input = document.querySelector("[data-writing-caption]");
            if (input) { input.value = title; input.focus(); }
            this.toast.show(text, "info", title);
          }, 80);
          return;
        }
        if (action === "export-progress") {
          const snapshot = this.store.exportSnapshot();
          Utils.download("hindi-learning-progress.json", JSON.stringify(snapshot, null, 2));
          this.store.recordExport();
          this.toast.show("Your progress export has been downloaded.", "success", "Export ready");
          this.render();
          return;
        }
        if (action === "trigger-import") { document.querySelector("[data-import-file]")?.click(); return; }
        if (action === "reset-progress") { this.openConfirmReset(); return; }
        if (action === "confirm-reset") {
          this.store.reset();
          this.runtime.activeQuiz = null;
          this.seedFlashcards();
          this.applyTheme();
          this.closeModal();
          this.toast.show("Progress reset. Fresh notebook, same brave learner.", "warning", "Reset complete");
          this.render();
          return;
        }
        if (action === "open-phrase-pack") { this.openPhrasePack(element.dataset.packId); return; }
      }

      applyTheme() {
        document.documentElement.dataset.theme = this.store.state.ui.theme;
        this.elements.appShell.dataset.theme = this.store.state.ui.theme;
      }

      openHelp() {
        this.openModal("Keyboard and navigation help", `
          <div class="stack-md">
            <div class="tile">
              <strong>Useful shortcuts</strong>
              <ul class="bullet-list">
                <li class="bullet-item"><span class="bullet-dot"></span><span><strong>/</strong> focuses the global search bar.</span></li>
                <li class="bullet-item"><span class="bullet-dot"></span><span><strong>G</strong> goes to the dashboard.</span></li>
                <li class="bullet-item"><span class="bullet-dot"></span><span><strong>L</strong> opens the lesson library.</span></li>
                <li class="bullet-item"><span class="bullet-dot"></span><span><strong>P</strong> opens practice.</span></li>
                <li class="bullet-item"><span class="bullet-dot"></span><span><strong>Escape</strong> closes audio or open modal windows.</span></li>
              </ul>
            </div>
            <div class="tile">
              <strong>What changed in this rebuild</strong>
              <ul class="bullet-list">
                <li class="bullet-item"><span class="bullet-dot"></span><span>Cleaner architecture with a dedicated store, renderer, toast system, and drawing board.</span></li>
                <li class="bullet-item"><span class="bullet-dot"></span><span>Search, filters, bookmarks, note-taking, export/import, and writing gallery support.</span></li>
                <li class="bullet-item"><span class="bullet-dot"></span><span>Generic lesson rendering so the platform scales cleanly as the content library grows.</span></li>
              </ul>
            </div>
          </div>
        `);
      }

      openPhrasePack(packId) {
        const pack = APP_DATA.phrasePacks.find((item) => item.id === packId);
        if (!pack) return;
        this.openModal(pack.title, `
          <div class="phrase-grid">
            ${pack.phrases.map((phrase) => `
              <div class="tile tile-accent">
                <div class="row space">
                  <div class="hindi">${Utils.escapeHtml(phrase.hindi)}</div>
                  <button class="btn soft icon" data-action="speak-text" data-text="${Utils.escapeHtml(phrase.hindi)}" aria-label="Speak phrase">🔊</button>
                </div>
                ${this.store.state.preferences.transliteration ? `<div class="translit">${Utils.escapeHtml(phrase.translit)}</div>` : ""}
                <div class="muted">${Utils.escapeHtml(phrase.english)}</div>
              </div>
            `).join("")}
          </div>
        `);
      }

      openConfirmReset() {
        this.openModal("Reset all progress?", `
          <div class="stack-md">
            <p class="muted">This clears lessons, XP, saved writing, notes, bookmarks, and quiz history from local storage.</p>
            <div class="row wrap">
              <button class="btn danger" data-action="confirm-reset">Yes, reset everything</button>
              <button class="btn soft" data-action="close-modal">Cancel</button>
            </div>
          </div>
        `);
      }

      openModal(title, bodyHtml) {
        this.modal.title.textContent = title;
        this.modal.body.innerHTML = bodyHtml;
        this.modal.root.classList.add("open");
        this.modal.root.setAttribute("aria-hidden", "false");
      }

      closeModal() {
        this.modal.root.classList.remove("open");
        this.modal.root.setAttribute("aria-hidden", "true");
      }

      navigate(route) {
        const payload = route === "learn" ? { lessonId: null } : {};
        this.store.setRoute(route, payload);
        this.render();
      }
      openLesson(lessonId) { this.store.setRoute("learn", { lessonId }); this.render(); }

      completeLesson(lessonId) {
        const added = this.store.completeLesson(lessonId);
        this.toast.show(added ? "Lesson completed and XP awarded." : "That lesson is already marked complete.", added ? "success" : "info", added ? "Well done" : "Already done");
        this.render();
      }

      seedFlashcards(track = "all") {
        this.runtime.flashcardFilter = track;
        const pool = track === "all" ? [...APP_DATA.masterLexicon] : APP_DATA.masterLexicon.filter((item) => item.track === track);
        this.runtime.flashcardPool = Utils.shuffle(pool);
        this.runtime.flashcardIndex = 0;
        this.runtime.flashcardFlipped = false;
      }

      moveFlashcard(direction) {
        if (!this.runtime.flashcardPool.length) return;
        const maxIndex = this.runtime.flashcardPool.length - 1;
        this.runtime.flashcardIndex += direction;
        if (this.runtime.flashcardIndex < 0) this.runtime.flashcardIndex = maxIndex;
        if (this.runtime.flashcardIndex > maxIndex) this.runtime.flashcardIndex = 0;
        this.runtime.flashcardFlipped = false;
        this.render();
      }

      startRandomQuiz() {
        const questionPool = APP_DATA.lessons.flatMap((lesson) => lesson.quiz.map((item) => ({ ...item, lessonId: lesson.id, lessonTitle: lesson.title })));
        this.runtime.activeQuiz = { source: "Random Review", questions: Utils.shuffle(questionPool).slice(0, 8), index: 0, answers: [], locked: false };
        this.store.setPracticeTab("quiz");
        this.navigate("practice");
      }

      startLessonQuiz(lessonId) {
        const lesson = APP_DATA.lessons.find((item) => item.id === lessonId);
        if (!lesson) return;
        this.runtime.activeQuiz = { source: lesson.title, questions: lesson.quiz.map((item) => ({ ...item, lessonId: lesson.id, lessonTitle: lesson.title })), index: 0, answers: [], locked: false };
        this.store.setPracticeTab("quiz");
        this.navigate("practice");
      }

      answerQuiz(answerIndex) {
        const session = this.runtime.activeQuiz;
        if (!session || session.locked) return;
        session.answers[session.index] = answerIndex;
        session.locked = true;
        this.render();
      }

      nextQuizQuestion() {
        const session = this.runtime.activeQuiz;
        if (!session) return;
        if (session.index < session.questions.length - 1) { session.index += 1; session.locked = false; this.render(); }
        else this.finishQuiz();
      }

      finishQuiz() {
        const session = this.runtime.activeQuiz;
        if (!session) return;
        const score = session.questions.reduce((sum, question, index) => sum + (session.answers[index] === question.answer ? 1 : 0), 0);
        const result = { source: session.source, score, total: session.questions.length, scorePercent: Utils.percent(score, session.questions.length) };
        this.store.recordQuiz(result);
        this.runtime.activeQuiz = { ...session, finished: true, result };
        this.toast.show(`Quiz finished with ${result.scorePercent}% accuracy.`, result.scorePercent >= 70 ? "success" : "warning", "Quiz complete");
        this.render();
      }

      getNextLesson() { return APP_DATA.lessons.find((lesson) => !this.store.state.progress.completedLessonIds.includes(lesson.id)) || APP_DATA.lessons[0]; }
      getRecommendedLessons() {
        const incomplete = APP_DATA.lessons.filter((lesson) => !this.store.state.progress.completedLessonIds.includes(lesson.id));
        const bookmarked = APP_DATA.lessons.filter((lesson) => this.store.state.progress.bookmarkedLessonIds.includes(lesson.id));
        const combined = [...bookmarked, ...incomplete];
        const seen = new Set();
        return combined.filter((lesson) => { if (seen.has(lesson.id)) return false; seen.add(lesson.id); return true; }).slice(0, 4);
      }
      getWeeklyBars() {
        const base = this.store.state.progress.completedLessonIds.length;
        return [42, 56, 38, 70, 84, 52, 68].map((value, index) => Utils.clamp(value + (((base + index * 13) % 18) - 9), 18, 100));
      }
      averageQuizScore() {
        if (!this.store.state.progress.quizHistory.length) return 0;
        const total = this.store.state.progress.quizHistory.reduce((sum, item) => sum + item.scorePercent, 0);
        return total / this.store.state.progress.quizHistory.length;
      }
      badgeClass(levelLabel) {
        const value = String(levelLabel).toLowerCase();
        if (value.includes("begin")) return "beginner";
        if (value.includes("inter")) return "intermediate";
        if (value.includes("adv")) return "advanced";
        return "poet";
      }
      getSearchResults() {
        const query = this.store.state.ui.search.trim().toLowerCase();
        if (!query) return { lessonHits: [], vocabHits: [] };
        const lessonHits = APP_DATA.lessons.filter((lesson) => {
          const haystack = [lesson.title, lesson.subtitle, lesson.intro, lesson.trackLabel, lesson.levelLabel, ...lesson.searchTags, ...lesson.vocab.flatMap((item) => [item.hindi, item.translit, item.english])].join(" ").toLowerCase();
          return haystack.includes(query);
        });
        const vocabHits = APP_DATA.masterLexicon.filter((item) => [item.hindi, item.translit, item.english].join(" ").toLowerCase().includes(query)).slice(0, 12);
        return { lessonHits, vocabHits };
      }

      filteredLessons() {
        const search = this.store.state.ui.search.toLowerCase();
        const filter = this.store.state.ui.lessonFilter;
        const sort = this.store.state.ui.lessonSort;
        let results = [...APP_DATA.lessons];
        if (filter === "bookmarked") results = results.filter((lesson) => this.store.state.progress.bookmarkedLessonIds.includes(lesson.id));
        else if (filter === "completed") results = results.filter((lesson) => this.store.state.progress.completedLessonIds.includes(lesson.id));
        else if (filter !== "all") results = results.filter((lesson) => lesson.track === filter);
        if (search) {
          results = results.filter((lesson) => {
            const haystack = [lesson.title, lesson.subtitle, lesson.intro, lesson.trackLabel, ...lesson.searchTags, ...lesson.vocab.flatMap((item) => [item.hindi, item.translit, item.english])].join(" ").toLowerCase();
            return haystack.includes(search);
          });
        }
        results.sort((a, b) => {
          if (sort === "xp") return b.xp - a.xp;
          if (sort === "duration") return b.duration - a.duration;
          if (sort === "title") return a.title.localeCompare(b.title);
          return a.order - b.order;
        });
        return results;
      }

          `;
        }
        const question = session.questions[session.index];
        const selected = session.answers[session.index];
        const answered = selected !== undefined;
        const progressPercent = Utils.percent(session.index, session.questions.length - 1 || 1);
        return `
          <section class="quiz-shell">
            <div class="card pad stack-md">

              <div><div class="eyebrow">Flashcards</div><h2 class="card-title">Flip the card. Let the word strike twice.</h2></div>
              <span class="pill">${this.runtime.flashcardIndex + 1}/${this.runtime.flashcardPool.length}</span>
            </div>
            <div class="row wrap">
              <button class="chip ${filter === "all" ? "active" : ""}" data-flash-filter="all">All</button>
              <button class="chip ${filter === "foundation" ? "active" : ""}" data-flash-filter="foundation">Foundation</button>
              <button class="chip ${filter === "core" ? "active" : ""}" data-flash-filter="core">Core</button>
              <button class="chip ${filter === "fluency" ? "active" : ""}" data-flash-filter="fluency">Fluency</button>
              <button class="chip ${filter === "poetry" ? "active" : ""}" data-flash-filter="poetry">Poetry</button>
            </div>
            <div class="flashcard-stage">
              <button class="flashcard ${this.runtime.flashcardFlipped ? "flipped" : ""}" data-action="flip-flashcard" aria-label="Flip flashcard">
                <div class="flashcard-inner">
                  <div class="flash-face flash-front">
                    <div class="pill">Front</div>
                    <div class="flash-word">${Utils.escapeHtml(card.hindi)}</div>
                    <div>${this.store.state.preferences.transliteration ? Utils.escapeHtml(card.translit) : "Tap to reveal"}</div>
                  </div>
                  <div class="flash-face flash-back">
                    <div class="pill">Back</div>
                    <div class="flash-english">${Utils.escapeHtml(card.english)}</div>
                    <div class="translit">${Utils.escapeHtml(card.translit)}</div>
                    <div class="muted">Track: ${Utils.escapeHtml(card.track)}</div>
                    <button class="btn soft" data-action="speak-text" data-text="${Utils.escapeHtml(card.hindi)}">Speak word</button>
                  </div>
                </div>
              </button>
              <div class="row wrap">
                <button class="btn soft" data-action="flash-prev">Previous</button>
                <button class="btn primary" data-action="flip-flashcard">Flip</button>
                <button class="btn soft" data-action="flash-next">Next</button>
                <button class="btn ghost" data-action="shuffle-flashcards">Shuffle</button>
              </div>
            </div>
          </section>
        `;
      }

      renderWritingBoard() {
        return `
          <section class="card pad stack-lg">
            <div><div class="eyebrow">Writing board</div><h2 class="card-title">Trace, scribble, draft, revise.</h2></div>
            <div class="row wrap">
              <div class="field">
                <label for="boardColor">Ink color</label>
                <input id="boardColor" type="color" value="${Utils.escapeHtml(this.store.state.preferences.boardColor)}" data-pref-color />
              </div>
              <div class="field">
                <label for="brushSize">Brush size</label>
                <div class="range-shell">
                  <input id="brushSize" type="range" min="2" max="18" value="${this.store.state.preferences.boardBrush}" data-pref-range="boardBrush" />
                  <strong>${this.store.state.preferences.boardBrush}px</strong>
                </div>
              </div>
              <div class="field" style="min-width:260px;">
                <label for="writingCaption">Gallery caption</label>
                <input id="writingCaption" class="input" data-writing-caption type="text" placeholder="Example: Doha draft 1" />
              </div>
            </div>
            <div class="canvas-wrap"><canvas id="writingCanvas" class="writing-canvas" width="1200" height="520" aria-label="Writing practice canvas"></canvas></div>
            <div class="row wrap">
              <button class="btn primary" data-action="save-canvas">Save to gallery</button>
              <button class="btn soft" data-action="clear-canvas">Clear board</button>
              <span class="muted">Use a stylus, mouse, or finger. The drawing logic lives in its own isolated class.</span>
            </div>
          </section>

          <section class="card pad stack-md">
            <div><div class="eyebrow">Prompt shelf</div><h2 class="card-title">Start from a spark</h2></div>
            <div class="prompt-grid">
              ${APP_DATA.writingPrompts.slice(0, 8).map((item) => `
                <div class="tile tile-accent">
                  <strong>${Utils.escapeHtml(item.title)}</strong>
                  <div class="muted">${Utils.escapeHtml(item.prompt)}</div>
                  <button class="btn soft" data-action="use-prompt" data-prompt-title="${Utils.escapeHtml(item.title)}" data-prompt-text="${Utils.escapeHtml(item.prompt)}">Use prompt</button>
                </div>
              `).join("")}
            </div>
          </section>
        `;
      }

      renderReviewMissions() {
        return `<section class="mission-grid">${APP_DATA.reviewMissions.map((mission) => `
          <article class="card pad stack-md">
            <div><div class="eyebrow">Mission</div><h2 class="card-title">${Utils.escapeHtml(mission.title)}</h2></div>
            <ul class="bullet-list">${mission.steps.map((step) => `<li class="bullet-item"><span class="bullet-dot"></span><span>${Utils.escapeHtml(step)}</span></li>`).join("")}</ul>
          </article>
        `).join("")}</section>`;
      }

      renderPractice() {
        const tab = this.store.state.ui.practiceTab;
        this.elements.view.innerHTML = `
          <section class="toolbar">
            <div class="row space">
              <div><div class="eyebrow">Practice lab</div><h1 class="section-title">Drill, flip, write, and revise.</h1></div>
              <button class="btn primary" data-action="start-random-quiz">Start random quiz</button>
            </div>
            <div class="practice-tabs">
              <button class="chip ${tab === "quiz" ? "active" : ""}" data-tab="quiz">Quiz lab</button>
              <button class="chip ${tab === "flashcards" ? "active" : ""}" data-tab="flashcards">Flashcards</button>
              <button class="chip ${tab === "writing" ? "active" : ""}" data-tab="writing">Writing board</button>
              <button class="chip ${tab === "missions" ? "active" : ""}" data-tab="missions">Review missions</button>
            </div>
          </section>
          <section class="practice-layout">
            ${tab === "quiz" ? this.renderQuizLab() : ""}
            ${tab === "flashcards" ? this.renderFlashcards() : ""}
            ${tab === "writing" ? this.renderWritingBoard() : ""}
            ${tab === "missions" ? this.renderReviewMissions() : ""}
          </section>
        `;
        if (tab === "writing") {
          const canvas = document.getElementById("writingCanvas");
          if (canvas) {
            this.board.mount(canvas);
            this.board.setColor(this.store.state.preferences.boardColor);
            this.board.setBrushSize(this.store.state.preferences.boardBrush);
          }
        }
      }

      renderCulture() {
        this.elements.view.innerHTML = `
          <section class="hero">
            <div class="hero-grid">
              <div>
                <div class="eyebrow">Culture and tone</div>
                <h1 class="hero-title">Language is grammar wearing weather, history, and hospitality.</h1>
                <p class="hero-copy">This section adds the softer material: etiquette, borrowed vocabulary, poetry cues, phrase packs, and compact grammar notes. It helps the app feel less like a workbook and more like a room with actual air inside it.</p>
              </div>
              <div class="hero-panel">
                <div class="hindi">भाषा केवल शब्द नहीं, संसार भी है।</div>
                ${this.store.state.preferences.transliteration ? `<div class="translit">bhaasha keval shabd nahin, sansaar bhi hai.</div>` : ""}
                <div class="muted">Language is not only words, but a world.</div>
              </div>
            </div>
          </section>

          <section class="culture-grid">
            ${APP_DATA.cultureCards.map((item) => `
              <article class="culture-card">
                <div class="culture-emoji">${item.emoji}</div>
                <h3 class="card-title">${Utils.escapeHtml(item.title)}</h3>
                <p class="muted">${Utils.escapeHtml(item.text)}</p>
              </article>
            `).join("")}
          </section>

          <section class="panel-grid">
            <section class="card pad stack-md">
              <div><div class="eyebrow">Phrase packs</div><h2 class="card-title">Useful language bundles</h2></div>
              <div class="phrase-grid">
                ${APP_DATA.phrasePacks.map((pack) => `
                  <div class="tile tile-accent">
                    <strong>${Utils.escapeHtml(pack.title)}</strong>
                    <div class="muted">${pack.phrases.length} phrases ready for quick review.</div>
                    <button class="btn soft" data-action="open-phrase-pack" data-pack-id="${pack.id}">Open pack</button>
                  </div>
                `).join("")}
              </div>
            </section>

            <section class="card pad stack-md">
              <div><div class="eyebrow">Grammar cards</div><h2 class="card-title">Compact reminders</h2></div>
              <div class="grammar-grid">
                ${APP_DATA.grammarCards.map((item) => `<div class="tile"><strong>${Utils.escapeHtml(item.title)}</strong><div class="muted">${Utils.escapeHtml(item.body)}</div></div>`).join("")}
              </div>
            </section>
          </section>
        `;
      }

      renderProfile() {
        const achievements = this.store.getAchievements();
        const gallery = this.store.state.progress.writingGallery;
        this.elements.view.innerHTML = `
          <section class="panel-grid">
            <section class="card pad stack-md">
              <div><div class="eyebrow">Profile</div><h1 class="section-title">Preferences and progress archive</h1></div>

              <div class="settings-grid">
                ${this.renderSettingToggle("Audio playback", "audioEnabled", this.store.state.preferences.audioEnabled, "Enable speech synthesis for Hindi words and phrases.")}
                ${this.renderSettingToggle("Show transliteration", "transliteration", this.store.state.preferences.transliteration, "Display romanized hints under Hindi text.")}
              </div>

              <div class="field">
                <label for="dailyGoal">Daily goal in minutes</label>
                <input id="dailyGoal" class="input" type="number" min="5" max="180" value="${this.store.state.preferences.dailyGoal}" data-pref-range="dailyGoal" />
              </div>

              <div class="row wrap">
                <button class="btn primary" data-action="export-progress">Export progress</button>
                <button class="btn soft" data-action="trigger-import">Import progress</button>
                <button class="btn danger" data-action="reset-progress">Reset everything</button>
                <input type="file" accept="application/json" hidden data-import-file />
              </div>
            </section>

            <section class="card pad stack-md">
              <div class="row space">
                <div><div class="eyebrow">Progress summary</div><h2 class="card-title">Your current arc</h2></div>
                <span class="pill">${achievements.filter((item) => item.unlocked).length}/${achievements.length} unlocked</span>
              </div>
              <div class="stack-sm">
                <div class="row space"><span class="muted">XP</span><strong>${this.store.state.progress.xp}</strong></div>
                <div class="row space"><span class="muted">Completed lessons</span><strong>${this.store.state.progress.completedLessonIds.length}</strong></div>
                <div class="row space"><span class="muted">Bookmarks</span><strong>${this.store.state.progress.bookmarkedLessonIds.length}</strong></div>
                <div class="row space"><span class="muted">Quiz average</span><strong>${Utils.round(this.averageQuizScore(), 0)}%</strong></div>
                <div class="row space"><span class="muted">Writing saves</span><strong>${this.store.state.progress.writingSaves}</strong></div>
                <div class="row space"><span class="muted">Last study date</span><strong>${Utils.escapeHtml(this.store.state.progress.lastStudyDate)}</strong></div>
              </div>
              <div class="progress-shell"><div class="progress-bar" style="width:${this.store.getCompletionPercent()}%"></div></div>
            </section>
          </section>

          <section class="card pad stack-md">
            <div><div class="eyebrow">Achievements</div><h2 class="card-title">What you have unlocked so far</h2></div>
            <div class="achievement-grid">${achievements.map((achievement) => this.renderAchievement(achievement)).join("")}</div>
          </section>

          <section class="card pad stack-md">
            <div class="row space">
              <div><div class="eyebrow">Writing gallery</div><h2 class="card-title">Saved sketches and drafts</h2></div>
              <span class="pill">${gallery.length} saved</span>
            </div>
            ${gallery.length ? `<div class="gallery-grid">${gallery.map((item) => `
              <article class="gallery-card">
                <img src="${item.imageData}" alt="${Utils.escapeHtml(item.caption || "Writing practice image")}" />
                <div class="gallery-caption">
                  <strong>${Utils.escapeHtml(item.caption || "Writing practice")}</strong>
                  <span>${Utils.escapeHtml(Utils.prettyDate(item.createdAt))}</span>
                </div>
              </article>
            `).join("")}</div>` : `<div class="muted">Your writing gallery is empty. Save a board sketch from the writing tab to start building an archive.</div>`}
          </section>
        `;
      }

      renderSettingToggle(title, key, value, description) {
        return `
          <div class="setting-row">
            <div class="stack-sm">
              <strong>${Utils.escapeHtml(title)}</strong>
              <span class="muted">${Utils.escapeHtml(description)}</span>
            </div>
            <label class="toggle ${value ? "active" : ""}">
              <input class="sr-only" type="checkbox" ${value ? "checked" : ""} data-pref-toggle="${key}" aria-label="${Utils.escapeHtml(title)}" />
            </label>
          </div>
        `;
      }

      render() {
        this.elements.xpPill.textContent = this.store.state.progress.xp;
        this.syncSidebar();
        this.syncRouteTabs();
        const route = this.store.state.ui.route;
        if (route === "learn" && this.store.state.ui.lessonId) { this.renderLessonDetail(this.store.state.ui.lessonId); return; }
        if (route === "dashboard") { this.renderDashboard(); return; }
        if (route === "learn") { this.renderLearn(); return; }
        if (route === "practice") { this.renderPractice(); return; }
        if (route === "culture") { this.renderCulture(); return; }
        if (route === "profile") { this.renderProfile(); return; }
        this.renderDashboard();
      }
    }

    window.app = new HindiLearningApp();
  </script>
</body>
</html>
