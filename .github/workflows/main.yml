name: 24-7 Keep Alive

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs every 6 hours
  workflow_dispatch:  # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Keep site active
        run: |
          curl -I https://timuetursnovcom-tech.github.io/-hindi-learning-platform/
          echo "✅ Site pinged successfully at $(date)"
